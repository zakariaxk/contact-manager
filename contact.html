<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contactual - Contacts</title>

  <link href="css/styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Top Nav -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="images/contactual-logo.png" alt="Contactual Logo" class="logo">
        <span class="brand-name">Contactual</span>
      </div>

      <div class="topbar-right">
        <span id="userName" class="user-pill"></span>
        <button type="button" id="logoutButton" class="btn btn-accent" onclick="doLogout();">Log Out</button>
      </div>
    </div>
  </header>

  <!-- Page Content -->
  <main class="page">
    <div class="grid">
      <!-- Add Contact -->
      <section class="card">
        <h2 class="card-title">Add Contact</h2>

        <form id="contact-form" onsubmit="return false;" class="form">
          <label class="field">
            <span class="field-label">Name</span>
            <input type="text" id="contactName" placeholder="John Doe" required>
          </label>

          <label class="field">
            <span class="field-label">Phone Number</span>
            <input type="text" id="contactPhone" placeholder="(xxx)-xxx-xxxx" required>
          </label>

          <label class="field">
            <span class="field-label">Email</span>
            <input type="email" id="contactEmail" placeholder="email@example.com" required>
          </label>

          <button type="button" class="btn btn-primary" onclick="addContact();">Add</button>
          <div id="contactAddResult" class="msg"></div>
        </form>
      </section>

      <!-- Contacts -->
      <section class="card">
        <h2 class="card-title">Contact List</h2>

        <div class="search-row">
          <input type="text" id="searchText" class="search" placeholder="Search Contact">
          <div id="contactSearchResult" class="msg"></div>
        </div>

        <div class="table-wrap">
          <table id="contacts-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th style="width: 160px;">Actions</th>
              </tr>
            </thead>
            <tbody id="contactsBody">
              <!-- rows injected by contacts.js -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      © Contactual | 2026
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/contacts.js"></script>
  <script>
    initContactsPage();
  </script>
</body>
</html>
