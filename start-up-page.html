<html>
<head>
	<title>COP4331 Log-In or Sign Up Page</title>
	<script type="text/javascript" src="js/md5.js"></script>
	<script type="text/javascript" src="js/start_code.js"></script>
    <link href="css/start_styles.css" rel="stylesheet">	
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" rel="stylesheet">
</head>

<body>


    <!-- Main container to hold all the content -->
    <div class="container">
        
        <!-- Title of the app -->
        <h1>COP4331 Log-In or Sign Up Page</h1>
        
        <!-- Flexbox content area for the Login and Sign-up menu -->
        <div class="content">
            
            <!-- Section for Login menu -->
            <div class="login-container">
                <h2>Log In</h2>
                <!--  Menu to authenticate users -->
                <form id="login-form">
                    <!-- Input field for Username -->
                    <sub>Username</sub><br>
                    <input type="text" id="loginUsername" placeholder="Username" required>

                    <br><sub>Password</sub><br>
                    <!-- Input field for password -->
                    <input type="password" id="loginPassword" placeholder="Password" required>

                    <!-- Button to submit the form -->
                    <div>
                        <button type="button" onclick="doLogin();">Log In</button>
                    </div>
                    
                </form>
            </div>
            
            <!-- Section for displaying the Sign-up menu -->
            <div class="signup-container">
                <h2>Sign Up</h2>
                
                <form id="signup-form">
                    <!-- Input field for User's name -->
                    <sub>Name</sub><br>
                    <input type="text" id="signupName" placeholder="Name" required>
                    
                    <!-- Input field for Username -->
                    <br><sub>Username</sub><br>
                    <input type="text" id="signupUsername" placeholder="Username" required>

                    <br><sub>Password</sub><br>
                    <!-- Input field for User password -->
                    <input type="password" id="signupPassword" placeholder="Password" required>

                    <!-- Button to submit the form -->
                    <div>
                        <button type="button" onclick="doSignUp();">Sign Up</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/md5.js"></script>
    <script src="js/auth.js"></script>


</body>
</html>
